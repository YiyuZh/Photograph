<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>New Analysis - Zhishe</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Manrope:wght@500;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-tertiary": "#ffffff",
                        "secondary-fixed": "#d8e2ff",

                        "surface-bright": "#f8f9ff",

                        "on-tertiary-fixed": "#351000",
                        "on-primary-container": "#fefcff",
                        "error-container": "#ffdad6",
                        "primary-fixed-dim": "#adc6ff",
                        "on-secondary-fixed": "#001a41",
                        "primary-fixed": "#d8e2ff",
                        "surface-container-highest": "#d5e3fc",
                        "on-secondary": "#ffffff",
                        "tertiary-fixed-dim": "#ffb595",
                        "surface-container-lowest": "#ffffff",
                        "secondary-fixed-dim": "#adc6ff",
                        "on-secondary-container": "#2d4c83",
                        "on-error-container": "#93000a",
                        "on-primary-fixed-variant": "#004493",
                        "outline": "#717786",
                        "error": "#ba1a1a",
                        "background": "#f8f9ff",
                        "on-primary": "#ffffff",
                        "tertiary-container": "#c64f00",
                        "on-tertiary-fixed-variant": "#7c2e00",

                        "surface-tint": "#005bc1",
                        "surface": "#f8f9ff",

                        "primary-container": "#0070eb",
                        "surface-container-low": "#eff4ff",
                        "secondary": "#405e96",
                        "surface-dim": "#ccdbf3",
                        "on-surface": "#0d1c2e",
                        "on-secondary-fixed-variant": "#26467d",
                        "surface-variant": "#d5e3fc"
                    },
                    borderRadius: {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    fontFamily: {
                        "headline": ["Manrope", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                        "label": ["Inter", "sans-serif"]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .icon-fill {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background text-on-background font-body antialiased min-h-screen flex">
<!-- SideNavBar -->
<nav class="hidden md:flex flex-col gap-2 p-4 fixed left-0 top-0 h-full w-64 bg-surface-container-low border-r border-outline-variant/20 z-50">
<div class="mb-8 px-2 flex items-center gap-3">
<div class="w-10 h-10 rounded-lg bg-primary-container/20 flex items-center justify-center shrink-0">
<span class="material-symbols-outlined text-primary" data-icon="lens">lens</span>
</div>
<div>
<h1 class="font-headline font-black text-primary text-xl tracking-tight">Zhishe</h1>
<p class="font-body text-[0.6875rem] text-on-surface-variant font-medium uppercase tracking-wider">Video Analysis</p>
</div>
</div>
<button class="w-full bg-gradient-to-br from-primary to-primary-container text-on-primary py-3 px-4 rounded-xl font-headline font-bold text-sm mb-6 shadow-[0_8px_32px_0_rgba(0,88,188,0.2)] hover:scale-[0.98] transition-transform flex items-center justify-center gap-2">
<span class="material-symbols-outlined icon-fill text-[1.125rem]" data-icon="add">add</span>
            New Analysis
        </button>
<div class="flex flex-col gap-1 flex-1">
<a class="flex items-center gap-3 px-3 py-2.5 text-on-surface-variant hover:bg-surface-variant/50 rounded-lg transition-all duration-300 font-body text-[0.8125rem] font-medium group" href="#">
<span class="material-symbols-outlined text-[1.25rem] text-outline group-hover:text-primary transition-colors" data-icon="grid_view">grid_view</span>
                Home
            </a>
<!-- Active State -->
<a class="flex items-center gap-3 px-3 py-2.5 bg-primary text-on-primary rounded-lg shadow-[0_4px_16px_0_rgba(0,88,188,0.2)] transition-all duration-300 font-body text-[0.8125rem] font-medium group" href="#">
<span class="material-symbols-outlined text-[1.25rem]" data-icon="assignment_turned_in">assignment_turned_in</span>
                Tasks
            </a>
<a class="flex items-center gap-3 px-3 py-2.5 text-on-surface-variant hover:bg-surface-variant/50 rounded-lg transition-all duration-300 font-body text-[0.8125rem] font-medium group" href="#">
<span class="material-symbols-outlined text-[1.25rem] text-outline group-hover:text-primary transition-colors" data-icon="auto_stories">auto_stories</span>
                Knowledge Base
            </a>
<a class="flex items-center gap-3 px-3 py-2.5 text-on-surface-variant hover:bg-surface-variant/50 rounded-lg transition-all duration-300 font-body text-[0.8125rem] font-medium group mt-auto" href="#">
<span class="material-symbols-outlined text-[1.25rem] text-outline group-hover:text-primary transition-colors" data-icon="settings">settings</span>
                Settings
            </a>
</div>
</nav>
<!-- Main Content Canvas -->
<main class="flex-1 md:ml-64 min-h-screen flex flex-col relative">
<!-- TopNavBar (Mobile mainly, hidden on md for full sidenav reliance in this layout, or kept minimal) -->
<header class="md:hidden flex items-center justify-between px-6 h-16 w-full bg-surface-bright/80 backdrop-blur-xl fixed top-0 z-40 border-b border-outline-variant/20 shadow-[0_8px_32px_0_rgba(13,28,46,0.04)]">
<h1 class="font-headline font-bold tracking-tighter text-primary text-xl">Zhishe</h1>
<button class="text-on-surface-variant">
<span class="material-symbols-outlined" data-icon="menu">menu</span>
</button>
</header>
<div class="p-6 md:p-10 lg:p-12 mt-16 md:mt-0 max-w-5xl mx-auto w-full flex-1 flex flex-col gap-8">
<!-- Page Header -->
<div class="flex flex-col gap-2">
<div class="flex items-center gap-2 text-on-surface-variant text-sm font-label">
<span class="material-symbols-outlined text-[1.125rem]" data-icon="arrow_back">arrow_back</span>
<a class="hover:text-primary transition-colors" href="#">Back to Tasks</a>
</div>
<h2 class="font-headline text-3xl font-bold text-on-surface tracking-tight mt-2">Create New Task</h2>
<p class="font-body text-on-surface-variant">Select the type of analysis you want to perform and define the parameters.</p>
</div>
<!-- Main Form Area (Bento-style layout) -->
<div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
<!-- Left Column: Task Type Selection (Cards) -->
<div class="lg:col-span-7 flex flex-col gap-6">
<h3 class="font-headline text-lg font-bold text-on-surface">1. Select Analysis Type</h3>
<div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
<!-- Option 1: Deconstruct -->
<label class="relative cursor-pointer group">
<input checked="" class="peer sr-only" name="task_type" type="radio" value="deconstruct"/>
<div class="h-full p-6 rounded-xl bg-surface-container-lowest border-2 border-transparent peer-checked:border-primary peer-checked:bg-surface-container-low transition-all duration-200 shadow-[0_4px_24px_0_rgba(13,28,46,0.03)] hover:shadow-[0_8px_32px_0_rgba(13,28,46,0.06)] flex flex-col gap-4">
<div class="w-12 h-12 rounded-full bg-surface-variant flex items-center justify-center peer-checked:bg-primary/10">
<span class="material-symbols-outlined text-[1.5rem] text-secondary peer-checked:text-primary transition-colors" data-icon="troubleshoot">troubleshoot</span>
</div>
<div>
<h4 class="font-headline font-bold text-on-surface text-base mb-1 group-hover:text-primary transition-colors">Deconstruct Reference Video</h4>
<p class="font-body text-xs text-on-surface-variant leading-relaxed">Analyze an existing video to break down pacing, shot framing, and visual hooks for inspiration.</p>
</div>
<div class="mt-auto pt-4 flex items-center justify-end">
<div class="w-5 h-5 rounded-full border-2 border-outline-variant peer-checked:border-primary flex items-center justify-center transition-colors">
<div class="w-2.5 h-2.5 rounded-full bg-primary opacity-0 peer-checked:opacity-100 transition-opacity"></div>
</div>
</div>
</div>
</label>
<!-- Option 2: Optimize -->
<label class="relative cursor-pointer group">
<input class="peer sr-only" name="task_type" type="radio" value="optimize"/>
<div class="h-full p-6 rounded-xl bg-surface-container-lowest border-2 border-transparent peer-checked:border-primary peer-checked:bg-surface-container-low transition-all duration-200 shadow-[0_4px_24px_0_rgba(13,28,46,0.03)] hover:shadow-[0_8px_32px_0_rgba(13,28,46,0.06)] flex flex-col gap-4">
<div class="w-12 h-12 rounded-full bg-surface-variant flex items-center justify-center peer-checked:bg-primary/10">
<span class="material-symbols-outlined text-[1.5rem] text-secondary peer-checked:text-primary transition-colors" data-icon="model_training">model_training</span>
</div>
<div>
<h4 class="font-headline font-bold text-on-surface text-base mb-1 group-hover:text-primary transition-colors">Optimize My Video</h4>
<p class="font-body text-xs text-on-surface-variant leading-relaxed">Upload your draft video to receive AI suggestions on retention improvements and engagement tactics.</p>
</div>
<div class="mt-auto pt-4 flex items-center justify-end">
<div class="w-5 h-5 rounded-full border-2 border-outline-variant peer-checked:border-primary flex items-center justify-center transition-colors">
<div class="w-2.5 h-2.5 rounded-full bg-primary opacity-0 peer-checked:opacity-100 transition-opacity"></div>
</div>
</div>
</div>
</label>
</div>
</div>
<!-- Right Column: Task Details Form -->
<div class="lg:col-span-5 flex flex-col gap-6">
<h3 class="font-headline text-lg font-bold text-on-surface">2. Task Details</h3>
<div class="bg-surface-container-lowest p-6 rounded-xl shadow-[0_4px_24px_0_rgba(13,28,46,0.03)] flex flex-col gap-5">
<!-- Title Input -->
<div class="flex flex-col gap-2">
<label class="font-label text-sm font-medium text-on-surface" for="task_title">Task Title</label>
<input class="w-full bg-surface-container-lowest border border-outline-variant/30 rounded-lg px-4 py-3 font-body text-sm text-on-surface placeholder:text-outline focus:border-primary focus:ring-1 focus:ring-primary/20 transition-all outline-none" id="task_title" placeholder="e.g., Tech Review Hook Analysis" type="text"/>
</div>
<!-- Description Input -->
<div class="flex flex-col gap-2 flex-1">
<label class="font-label text-sm font-medium text-on-surface flex justify-between" for="task_description">
                                Task Description
                                <span class="text-outline font-normal text-xs">Optional</span>
</label>
<textarea class="w-full bg-surface-container-lowest border border-outline-variant/30 rounded-lg px-4 py-3 font-body text-sm text-on-surface placeholder:text-outline focus:border-primary focus:ring-1 focus:ring-primary/20 transition-all outline-none resize-none" id="task_description" placeholder="Briefly describe what specific aspects you want the AI to focus on..." rows="4"></textarea>
</div>
</div>
</div>
</div>
<!-- Action Area -->
<div class="mt-4 flex justify-end gap-4 border-t border-outline-variant/10 pt-6">
<button class="px-6 py-2.5 rounded-xl font-headline font-bold text-sm text-primary border border-outline-variant/30 hover:bg-surface-container-low transition-colors">
                    Cancel
                </button>
<button class="px-8 py-2.5 rounded-xl font-headline font-bold text-sm text-on-primary bg-gradient-to-br from-primary to-primary-container shadow-[0_4px_16px_0_rgba(0,88,188,0.2)] hover:scale-[0.98] transition-transform flex items-center gap-2">
                    Continue to Upload
                    <span class="material-symbols-outlined text-[1.125rem]" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</div>
</main>
</body></html>
