<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login - Zhishe</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-container-low": "#eff4ff",
                    "secondary-fixed": "#d8e2ff",
                    "background": "#f8f9ff",
                    "on-primary": "#ffffff",
                    "on-primary-container": "#fefcff",
                    "surface-bright": "#f8f9ff",
                    "surface-container-highest": "#d5e3fc",
                    "tertiary-container": "#c64f00",
                    "primary-fixed-dim": "#adc6ff",
                    "on-tertiary-container": "#fffbff",
                    "surface-container": "#e6eeff",
                    "tertiary": "#9e3d00",
                    "outline-variant": "#c1c6d7",
                    "on-secondary-fixed-variant": "#26467d",
                    "on-primary-fixed": "#001a41",
                    "primary-fixed": "#d8e2ff",
                    "surface-container-high": "#dce9ff",
                    "inverse-on-surface": "#eaf1ff",
                    "on-background": "#0d1c2e",
                    "on-secondary-fixed": "#001a41",
                    "on-tertiary-fixed-variant": "#7c2e00",
                    "tertiary-fixed": "#ffdbcc",
                    "primary-container": "#0070eb",
                    "surface": "#f8f9ff",
                    "inverse-primary": "#adc6ff",
                    "on-secondary": "#ffffff",
                    "surface-tint": "#005bc1",
                    "secondary-fixed-dim": "#adc6ff",
                    "on-surface-variant": "#414755",
                    "on-error": "#ffffff",
                    "on-error-container": "#93000a",
                    "on-secondary-container": "#2d4c83",
                    "on-tertiary-fixed": "#351000",
                    "surface-container-lowest": "#ffffff",
                    "tertiary-fixed-dim": "#ffb595",
                    "error-container": "#ffdad6",
                    "inverse-surface": "#233144",
                    "on-surface": "#0d1c2e",
                    "on-tertiary": "#ffffff",
                    "secondary": "#405e96",
                    "surface-dim": "#ccdbf3",
                    "error": "#ba1a1a",
                    "surface-variant": "#d5e3fc",
                    "on-primary-fixed-variant": "#004493",
                    "secondary-container": "#a1befd",
                    "primary": "#0058bc",
                    "outline": "#717786"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "spacing": {},
            "fontFamily": {
                    "headline": [
                            "Manrope"
                    ],
                    "body": [
                            "Inter"
                    ],
                    "label": [
                            "Inter"
                    ]
            }
          },
        },
      }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        h1, h2, h3, h4, h5, h6, .font-headline {
            font-family: 'Manrope', sans-serif;
        }
        /* Custom Ambient Shadow for Floating Panels */
        .shadow-ambient {
            box-shadow: 0 32px 64px -12px rgba(13, 28, 46, 0.08), 0 16px 32px -8px rgba(13, 28, 46, 0.04);
        }
        /* Primary Gradient for Buttons */
        .bg-primary-gradient {
            background: linear-gradient(135deg, #0058bc 0%, #0070eb 100%);
        }
    </style>
</head>
<body class="bg-background text-on-surface min-h-screen flex items-center justify-center p-4 antialiased">
<!-- Ambient Background Elements to break up the sterile look while keeping it clean -->
<div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
<div class="absolute -top-[20%] -left-[10%] w-[70%] h-[70%] rounded-full bg-surface-container-low/50 blur-[120px]"></div>
<div class="absolute -bottom-[20%] -right-[10%] w-[60%] h-[60%] rounded-full bg-surface-container/40 blur-[100px]"></div>
</div>
<!-- Login Card Container -->
<main class="w-full max-w-md relative z-10">
<!-- Nesting level 2: Surface Container Lowest (White) to pop off the Background -->
<div class="bg-surface-container-lowest rounded-xl shadow-ambient overflow-hidden">
<!-- Header Section -->
<div class="p-8 pb-6 border-b border-outline-variant/10">
<div class="flex items-center justify-center mb-6">
<div class="w-12 h-12 bg-surface-container-low rounded-lg flex items-center justify-center text-primary">
<span class="material-symbols-outlined text-3xl" data-weight="fill" style="font-variation-settings: 'FILL' 1;">view_in_ar</span>
</div>
</div>
<div class="text-center">
<h1 class="font-headline text-3xl font-bold text-on-surface tracking-tight mb-2">Zhishe</h1>
<p class="font-label text-sm text-on-surface-variant font-medium">AI 视频分析工作流系统</p>
</div>
</div>
<!-- Form Section -->
<div class="p-8 pt-6 bg-surface-container-lowest">
<form action="#" class="space-y-5" method="POST">
<!-- Username Input -->
<div class="space-y-2">
<label class="block font-label text-sm font-semibold text-on-surface" for="username">Username</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant/60 text-xl">person</span>
</div>
<input class="block w-full pl-10 pr-3 py-3 font-body text-sm bg-surface-container-lowest border border-outline-variant/20 rounded-lg text-on-surface placeholder-on-surface-variant/40 focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary transition-all duration-200" id="username" name="username" placeholder="Enter your username" type="text"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-2">
<div class="flex items-center justify-between">
<label class="block font-label text-sm font-semibold text-on-surface" for="password">Password</label>
<a class="font-label text-xs font-medium text-primary hover:text-primary-container transition-colors" href="#">Forgot password?</a>
</div>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant/60 text-xl">lock</span>
</div>
<input class="block w-full pl-10 pr-10 py-3 font-body text-sm bg-surface-container-lowest border border-outline-variant/20 rounded-lg text-on-surface placeholder-on-surface-variant/40 focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary transition-all duration-200" id="password" name="password" placeholder="Enter your password" type="password"/>
<button class="absolute inset-y-0 right-0 pr-3 flex items-center text-on-surface-variant/60 hover:text-on-surface transition-colors focus:outline-none" type="button">
<span class="material-symbols-outlined text-xl">visibility_off</span>
</button>
</div>
</div>
<!-- Remember Me & Extra Options (Optional, keeping it minimal) -->
<div class="flex items-center pt-2">
<input class="h-4 w-4 rounded border-outline-variant/30 text-primary focus:ring-primary bg-surface-container-lowest cursor-pointer" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-2 block text-sm font-label text-on-surface-variant cursor-pointer" for="remember-me">
                            Keep me logged in
                        </label>
</div>
<!-- Submit Button -->
<div class="pt-4">
<button class="w-full flex justify-center py-3.5 px-4 border border-transparent rounded-xl shadow-sm text-sm font-semibold font-headline text-on-primary bg-primary-gradient hover:opacity-90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-all duration-200" type="submit">
                            Login
                        </button>
</div>
</form>
</div>
<!-- Footer/Disclaimer Area inside Card -->
<div class="px-8 py-5 bg-surface-container-low/50 border-t border-outline-variant/10 text-center">
<p class="font-label text-xs text-on-surface-variant/70">
                    Protected by precision-grade security protocols.
                 </p>
</div>
</div>
<!-- External Footer (Optional) -->
<div class="mt-8 text-center">
<p class="font-label text-xs text-on-surface-variant/50">
                © 2024 Zhishe Systems. All rights reserved.
            </p>
</div>
</main>
</body></html>
